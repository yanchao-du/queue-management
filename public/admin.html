<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 600px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    h1 { color: #333; }
    .count {
      background: #007bff;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #007bff; color: white; }
    .btn-primary:hover { background: #0056b3; }
    .btn-danger { background: #dc3545; color: white; }
    .btn-danger:hover { background: #c82333; }
    .queue-list { list-style: none; }
    .queue-item {
      background: white;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .queue-item:first-child {
      border-left: 4px solid #28a745;
    }
    .person-info { flex: 1; }
    .person-name { font-weight: 600; font-size: 18px; }
    .person-details { color: #666; font-size: 14px; margin-top: 4px; }
    .position {
      width: 40px;
      height: 40px;
      background: #e9ecef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 16px;
    }
    .queue-item:first-child .position {
      background: #28a745;
      color: white;
    }
    .btn-checkin {
      background: #28a745;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-checkin:hover { background: #218838; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Queue Admin</h1>
      <div class="count" id="count">0 in queue</div>
    </header>
    
    <div class="actions">
      <button class="btn btn-primary" onclick="loadQueue()">Refresh</button>
      <button class="btn btn-danger" onclick="clearQueue()">Clear All</button>
    </div>
    
    <ul class="queue-list" id="queueList">
      <li class="empty">
        <div class="empty-icon">✓</div>
        <p>Queue is empty</p>
      </li>
    </ul>
  </div>

  <script>
    async function loadQueue() {
      try {
        const res = await fetch('/api/admin/queue');
        const queue = await res.json();
        
        document.getElementById('count').textContent = `${queue.length} in queue`;
        
        const list = document.getElementById('queueList');
        if (queue.length === 0) {
          list.innerHTML = `
            <li class="empty">
              <div class="empty-icon">✓</div>
              <p>Queue is empty</p>
            </li>
          `;
          return;
        }
        
        list.innerHTML = queue.map((person, i) => `
          <li class="queue-item">
            <div class="position">${i + 1}</div>
            <div class="person-info">
              <div class="person-name">${escapeHtml(person.name)}</div>
              <div class="person-details">
                #${person.id}${person.phone ? ' • ' + escapeHtml(person.phone) : ''} • ${formatTime(person.created_at)}
              </div>
            </div>
            <button class="btn-checkin" onclick="checkin(${person.id})">
              Check In
            </button>
          </li>
        `).join('');
      } catch (err) {
        console.error('Failed to load queue:', err);
      }
    }

    async function checkin(id) {
      if (!confirm('Check in this person?')) return;
      
      try {
        const res = await fetch(`/api/admin/checkin/${id}`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          loadQueue();
        }
      } catch (err) {
        console.error('Failed to check in:', err);
      }
    }

    async function clearQueue() {
      if (!confirm('Clear the entire queue? This cannot be undone.')) return;
      
      try {
        await fetch('/api/admin/queue', { method: 'DELETE' });
        loadQueue();
      } catch (err) {
        console.error('Failed to clear queue:', err);
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Load queue on page load and refresh every 5 seconds
    loadQueue();
    setInterval(loadQueue, 5000);
  </script>
</body>
</html>
