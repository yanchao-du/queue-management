<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 400px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 30px; color: #333; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card h2 { margin-bottom: 16px; font-size: 18px; color: #555; }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    input:focus { outline: none; border-color: #007bff; }
    button {
      width: 100%;
      padding: 14px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #0056b3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .status {
      text-align: center;
      padding: 20px;
      border-radius: 8px;
      margin-top: 12px;
    }
    .status.success { background: #d4edda; color: #155724; }
    .status.info { background: #e7f3ff; color: #004085; }
    .status.error { background: #f8d7da; color: #721c24; }
    .position { font-size: 48px; font-weight: bold; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Queue</h1>
    
    <div class="card">
      <h2>Join the Queue</h2>
      <form id="joinForm">
        <input type="text" id="name" placeholder="Your name" required>
        <input type="tel" id="phone" placeholder="Phone (optional)">
        <button type="submit">Join Queue</button>
      </form>
      <div id="joinResult" class="status hidden"></div>
    </div>
    
    <div class="card">
      <h2>Check Your Status</h2>
      <form id="statusForm">
        <input type="text" id="checkId" placeholder="Your queue number">
        <button type="submit">Check Status</button>
      </form>
      <div id="statusResult" class="status hidden"></div>
    </div>
  </div>

  <script>
    const joinForm = document.getElementById('joinForm');
    const joinResult = document.getElementById('joinResult');
    const statusForm = document.getElementById('statusForm');
    const statusResult = document.getElementById('statusResult');

    joinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      
      try {
        const res = await fetch('/api/join', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone })
        });
        const data = await res.json();
        
        if (res.ok) {
          joinResult.className = 'status success';
          joinResult.innerHTML = `
            <div class="position">#${data.position}</div>
            <p>Queue number: <strong>${data.id}</strong></p>
            <p>Save this number to check your status!</p>
          `;
          document.getElementById('checkId').value = data.id;
          joinForm.reset();
        } else {
          joinResult.className = 'status error';
          joinResult.textContent = data.error;
        }
      } catch (err) {
        joinResult.className = 'status error';
        joinResult.textContent = 'Connection error';
      }
      joinResult.classList.remove('hidden');
    });

    statusForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('checkId').value;
      
      try {
        const res = await fetch(`/api/status?id=${id}`);
        const data = await res.json();
        
        if (data.inQueue) {
          statusResult.className = 'status info';
          statusResult.innerHTML = `
            <div class="position">#${data.position}</div>
            <p>${data.name}</p>
            <p>${data.position} of ${data.total} in queue</p>
          `;
        } else {
          statusResult.className = 'status error';
          statusResult.textContent = 'Not found in queue (already served or invalid number)';
        }
      } catch (err) {
        statusResult.className = 'status error';
        statusResult.textContent = 'Connection error';
      }
      statusResult.classList.remove('hidden');
    });
  </script>
</body>
</html>
